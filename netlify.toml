# ─── VK Digitals & Financial Services LLP ───
# Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."   # Static site — all files in root
  functions = "functions"
  # No build command needed — pure HTML/CSS/JS

# ─── Global Security Headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy   = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.quilljs.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.quilljs.com; img-src 'self' data: https: blob:; script-src 'self' https://cdn.quilljs.com https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; frame-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none';"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ─── API Proxies ───
[[redirects]]
  from = "/api/send-otp"
  to   = "/.netlify/functions/send-otp"
  status = 200

[[redirects]]
  from = "/api/verify-otp"
  to   = "/.netlify/functions/verify-otp"
  status = 200

# ─── Admin Redirect ───
[[redirects]]
  from = "/admins"
  to   = "/admins.html"
  status = 200


# ─── Cache: Static Assets (long-lived) ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

[[headers]]
  for = "/script.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

# ─── Cache: HTML (short-lived so updates propagate fast) ───
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Redirects ───
# Clean URLs (optional: allow /contact → /contact.html)
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301
  force  = false

[[redirects]]
  from   = "/about"
  to     = "/about.html"
  status = 301

[[redirects]]
  from   = "/services"
  to     = "/services.html"
  status = 301

[[redirects]]
  from   = "/partners"
  to     = "/partners.html"
  status = 301

[[redirects]]
  from   = "/contact"
  to     = "/contact.html"
  status = 301

[[redirects]]
  from   = "/privacy"
  to     = "/privacy.html"
  status = 301

[[redirects]]
  from   = "/terms"
  to     = "/terms.html"
  status = 301

# Catch-all → custom 404
[[redirects]]
  from   = "/*"
  to     = "/404.html"
  status = 404
