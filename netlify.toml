# ─── VK Digitals & Financial Services LLP ───
# Netlify Configuration for Next.js
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = ".next"
  functions = "functions"

# ─── Global Security Headers ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()"
    Content-Security-Policy   = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.quilljs.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.quilljs.com; img-src 'self' data: https: blob:; script-src 'self' https://cdn.quilljs.com https://cdn.jsdelivr.net 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://cdn.quilljs.com; frame-src 'self' https://www.google.com; frame-ancestors 'none'; base-uri 'self'; object-src 'none';"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ─── API Proxies ───
[[redirects]]
  from = "/api/send-otp"
  to   = "/.netlify/functions/send-otp"
  status = 200

[[redirects]]
  from = "/api/verify-otp"
  to   = "/.netlify/functions/verify-otp"
  status = 200

# ─── Admin Interface ───
[[redirects]]
  from = "/admins"
  to   = "/admins.html"
  status = 200

# Next.js will handle all other caching and routing natively.
